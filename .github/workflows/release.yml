name: Release

on:
    # Runs after CI passes on main — avoids releasing broken builds
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [main]

permissions:
    contents: write # Create tags, releases, commit CHANGELOG
    packages: write # Push to GHCR
    issues: write # semantic-release can comment on issues
    pull-requests: write # semantic-release can comment on PRs
    id-token: write # OIDC for attestations (future-proof)

jobs:
    release:
        name: Semantic Release
        runs-on: ubuntu-latest
        # Only run when CI succeeded
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        outputs:
            new_release_published: ${{ steps.release.outputs.new_release_published }}
            new_release_version: ${{ steps.release.outputs.new_release_version }}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6
              with:
                  # Full history required for semantic-release to analyze all commits
                  fetch-depth: 0
                  persist-credentials: false

            - name: Run Semantic Release
              id: release
              uses: cycjimmy/semantic-release-action@v6
              with:
                  # Extra plugins not bundled with cycjimmy action
                  extra_plugins: |
                      @semantic-release/changelog@6
                      @semantic-release/git@10
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    docker-push:
        name: Push Docker Image to GHCR
        runs-on: ubuntu-latest
        needs: release
        # Only runs when semantic-release actually created a new version
        if: ${{ needs.release.outputs.new_release_published == 'true' }}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository }}:v${{ needs.release.outputs.new_release_version }}
                      ghcr.io/${{ github.repository }}:latest
                  # Reuse cached layers from docker.yml CI validation runs
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
